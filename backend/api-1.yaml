                      organizations:
                        type: integer
                        format: int64
                      users:
                        type: integer
                        format: int64
                      sessions:
                        type: integer
                        format: int64
                      webhooks:
                        type: integer
                        format: int64
                      requests:
                        type: object
                        required:
                          - total
                          - minute
                          - hour
                          - day
                          - week
                          - month
                          - year
                        properties:
                          total:
                            type: integer
                            format: int64
                            minimum: 0
                          minute:
                            type: integer
                            format: int64
                            minimum: 0
                          hour:
                            type: integer
                            format: int64
                            minimum: 0
                          day:
                            type: integer
                            format: int64
                            minimum: 0
                          week:
                            type: integer
                            format: int64
                            minimum: 0
                          month:
                            type: integer
                            format: int64
                            minimum: 0
                          year:
                            type: integer
                            format: int64
                            minimum: 0
                      internal:
                        type: object
                        required:
                          - idleReadConnections
                          - idleWriteConnections
                          - cacheHits
                          - cacheMisses
                        properties:
                          idleReadConnections:
                            type: integer
                            minimum: 0
                          idleWriteConnections:
                            type: integer
                            minimum: 0
                          cacheHits:
                            type: integer
                            minimum: 0
                          cacheMisses:
                            type: integer
                            minimum: 0
