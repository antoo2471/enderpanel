openapi: 3.1.0
info:
  title: MCJars API
  version: 3.9.1:0587af7
servers:
  - url: https://mcjars.app
paths:
  /api/organization/v1:
    get:
      operationId: get_api_organization_v1
      responses:
        "200":
          description: ""
          content:
            application/json:
              schema:
                type: object
                required:
                  - success
                  - infos
                  - stats
                properties:
                  success:
                    type: boolean
                  infos:
                    type: object
                    required:
                      - icon
                      - name
                      - types
                    properties:
                      icon:
                        $ref: "#/components/schemas/CompactString"
                      name:
                        $ref: "#/components/schemas/CompactString"
                      types:
                        type: array
                        items:
                          $ref: "#/components/schemas/ServerType"
                  stats:
                    type: object
                    required:
                      - requests
                      - userAgents
                      - origins
                    properties:
                      requests:
                        type: integer
                        format: int64
                        minimum: 0
                      userAgents:
                        type: array
                        items:
                          type: string
                      origins:
                        type: array
                        items:
                          type: string
  /api/organization/v1/types:
    get:
      operationId: get_api_organization_v1_types
      responses:
        "200":
          description: ""
          content:
            application/json:
              schema:
                type: object
                required:
                  - success
                  - types
                properties:
                  success:
                    type: boolean
                  types:
                    type: object
                    additionalProperties:
                      $ref: "#/components/schemas/ServerTypeInfo"
                    propertyNames:
                      type: string
                      enum:
                        - VANILLA
                        - PAPER
                        - PUFFERFISH
                        - SPIGOT
                        - FOLIA
                        - PURPUR
                        - WATERFALL
                        - VELOCITY
                        - FABRIC
                        - BUNGEECORD
                        - QUILT
                        - FORGE
                        - NEOFORGE
                        - MOHIST
                        - ARCLIGHT
                        - SPONGE
                        - LEAVES
                        - CANVAS
                        - ASPAPER
                        - LEGACY_FABRIC
                        - LOOHP_LIMBO
                        - NANOLIMBO
                        - DIVINEMC
                        - MAGMA
                        - LEAF
                        - VELOCITY_CTD
                        - YOUER
                        - PLUTO
    patch:
      operationId: patch_api_organization_v1_types
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - types
              properties:
                types:
                  type: array
                  items:
                    $ref: "#/components/schemas/ServerType"
        required: true
      responses:
        "200":
          description: ""
          content:
            application/json:
              schema:
                type: object
                required:
                  - success
                properties:
                  success:
                    type: boolean
