components:
  schemas:
    ApiUser:
      type: object
      title: User
      required:
        - id
        - githubId
        - admin
        - avatar
        - email
        - login
      properties:
        id:
          type: integer
          format: int32
        githubId:
          type: integer
          format: int32
        admin:
          type: boolean
        name:
          oneOf:
            - type: "null"
            - $ref: "#/components/schemas/CompactString"
        avatar:
          $ref: "#/components/schemas/CompactString"
        email:
          $ref: "#/components/schemas/CompactString"
        login:
          $ref: "#/components/schemas/CompactString"
    Build:
      type: object
      required:
        - id
        - type
        - experimental
        - name
        - buildNumber
        - installation
        - changes
      properties:
        id:
          type: integer
          format: int32
        versionId:
          oneOf:
            - type: "null"
            - $ref: "#/components/schemas/CompactString"
        projectVersionId:
          oneOf:
            - type: "null"
            - $ref: "#/components/schemas/CompactString"
        type:
          $ref: "#/components/schemas/ServerType"
        experimental:
          type: boolean
        name:
          $ref: "#/components/schemas/CompactString"
        buildNumber:
          type: integer
          format: int32
        jarUrl:
          oneOf:
            - type: "null"
            - $ref: "#/components/schemas/CompactString"
        jarSize:
          type:
            - integer
            - "null"
          format: int32
        zipUrl:
          oneOf:
            - type: "null"
            - $ref: "#/components/schemas/CompactString"
        zipSize:
          type:
            - integer
            - "null"
          format: int32
        installation:
          type: array
          items:
            type: array
            items:
              $ref: "#/components/schemas/InstallationStep"
        changes:
          type: array
          items:
            $ref: "#/components/schemas/CompactString"
        created:
          type:
            - string
            - "null"
          format: date-time
    CompactString:
      type: string
    Config:
      type: object
      required:
        - type
        - format
        - aliases
      properties:
        type:
          $ref: "#/components/schemas/ServerType"
        format:
          $ref: "#/components/schemas/Format"
        aliases:
          type: array
          items:
            type: string
    Format:
      type: string
      enum:
        - PROPERTIES
        - YAML
        - CONF
        - TOML
        - JSON5
    InstallationStep:
      oneOf:
        - allOf:
            - type: object
              required:
                - url
                - file
                - size
              properties:
                url:
                  $ref: "#/components/schemas/CompactString"
                file:
                  $ref: "#/components/schemas/CompactString"
                size:
                  type: integer
                  format: int64
                  minimum: 0
            - type: object
              required:
                - type
              properties:
                type:
                  type: string
                  enum:
                    - download
        - allOf:
            - type: object
              required:
                - file
                - location
              properties:
                file:
                  $ref: "#/components/schemas/CompactString"
                location:
                  $ref: "#/components/schemas/CompactString"
            - type: object
              required:
                - type
              properties:
                type:
                  type: string
                  enum:
                    - unzip
        - allOf:
            - type: object
              required:
                - location
              properties:
                location:
                  $ref: "#/components/schemas/CompactString"
            - type: object
              required:
                - type
              properties:
                type:
                  type: string
                  enum:
                    - remove
    MinifiedVersion:
      type: object
      required:
        - id
        - type
        - supported
        - java
        - builds
        - created
      properties:
        id:
          $ref: "#/components/schemas/CompactString"
        type:
          $ref: "#/components/schemas/VersionType"
        supported:
          type: boolean
        java:
          type: integer
          format: int32
        builds:
          type: integer
          format: int64
        created:
          type: string
          format: date-time
    MinifiedVersionStats:
      type: object
      required:
        - type
        - supported
        - java
        - created
        - builds
      properties:
        type:
          $ref: "#/components/schemas/VersionType"
        supported:
          type: boolean
        java:
          type: integer
          format: int32
        created:
          type: string
          format: date-time
        builds:
          type: object
          additionalProperties:
            type: integer
            format: int64
          propertyNames:
            type: string
            enum:
              - VANILLA
              - PAPER
              - PUFFERFISH
              - SPIGOT
              - FOLIA
              - PURPUR
              - WATERFALL
              - VELOCITY
              - FABRIC
              - BUNGEECORD
              - QUILT
              - FORGE
              - NEOFORGE
              - MOHIST
              - ARCLIGHT
              - SPONGE
              - LEAVES
              - CANVAS
              - ASPAPER
              - LEGACY_FABRIC
              - LOOHP_LIMBO
              - NANOLIMBO
              - DIVINEMC
              - MAGMA
              - LEAF
              - VELOCITY_CTD
              - YOUER
